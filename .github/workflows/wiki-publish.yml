name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "scripts/migrate-wiki.mjs"
      - ".github/workflows/wiki-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build wiki pages
        run: node scripts/migrate-wiki.mjs /tmp/wiki-out
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Push to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repo
          rsync -av --delete /tmp/wiki-out/ wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Wiki is up to date."
          else
            git commit -m "Sync wiki from ${GITHUB_SHA:0:7}"
            git push
          fi
